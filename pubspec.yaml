name: messy
description: "Messy — serverless mesh messenger. E2E-encrypted messaging, photos, and video over Wi-Fi LAN, Wi-Fi Direct hotspots, and opportunistic internet P2P."
publish_to: 'none'

version: 2.4.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  flutter_riverpod: ^2.6.1

  # Local-only storage (SQLite)
  drift: ^2.28.0
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5

  # Crypto: X25519 / Ed25519 / HKDF / AES-256-GCM
  cryptography: ^2.7.0
  crypto: ^3.0.7 # sync SHA-256 for node ids / fingerprints
  flutter_secure_storage: ^9.2.4

  # Contacts: QR exchange
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

  # Media (Phase 4)
  image_picker: ^1.2.0

  # Platform
  permission_handler: ^12.0.1
  flutter_local_notifications: ^19.4.0

  # Misc
  uuid: ^4.5.1
  clock: ^1.1.2
  freezed_annotation: ^3.1.0
  flutter_foreground_task: ^10.0.0
  video_compress: ^3.1.4
  bluetooth_low_energy: ^6.2.1

  # --- Planned (added in later phases; see docs/ARCHITECTURE.md) ---
  # flutter_p2p_connection: ^…   # Phase 3 — Wi-Fi Direct / hotspot groups
  # nsd: ^…                      # Phase 2 — mDNS LAN discovery
  # flutter_foreground_task: ^…  # Phase 3 — keep mesh alive in background
  # workmanager: ^…              # Phase 4 — 24 h auto-wipe job
  # flutter_image_compress: ^…   # Phase 4
  # video_compress: ^…           # Phase 4
  # video_thumbnail: ^…          # Phase 4
  # video_player: ^…             # Phase 4
  # photo_view: ^…               # Phase 4
  # flutter_webrtc: ^…           # Phase 5 — internet P2P (STUN-only)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.6.1
  drift_dev: ^2.28.0
  freezed: ^3.2.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0E1116"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"

flutter:
  uses-material-design: true
